# Gateless 2-layer-MLP fast weights + one rotary per address space:
# input (q/k, F=21 -> 252/256) and the single hidden (F_h=64 -> 768/768).
# Same inner net and params as cam_mlp2_base up to rotary gains
# (6x21 + 6x64 = 510 per layer). Shows the recipe is not SwiGLU-specific:
# the rotary sites follow the address spaces, not the gating structure.
patch_size: 16
dim: 256
layers: 6

block_config:
  - type: model.SelfAttention
    length_dim: l
    params:
      head_dim: 64
      use_qk_norm: true
  - type: lact_ttt_cam.CamFastWeightGluMLPMultihead
    length_dim: vl
    params:
      head_dim: 256
      inter_multi: 3
      base_lr: 0.01
      muon_update_steps: 5
      cam_mode: mlp2_rot2
      num_freqs: 21
      num_freqs_h: 64
  - type: model.MLP
    length_dim: vl
    params:
      inter_multi: 4
