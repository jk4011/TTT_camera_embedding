# Gateless 2-layer-MLP fast weights, no rotary (generality-control baseline).
# Inner net per head: f(x) = silu(x W0) W1 — the SwiGLU gate branch removed.
# inter_multi 3 keeps fast-weight params identical to the SwiGLU x2 layer
# (2 x 256 x 768 = 3 x 256 x 512 = 393,216); lr_fc has 2 channels (vs 3).
# Pair: cam_mlp2_rot2.yaml differs only in rotary gains -> param-neutral.
patch_size: 16
dim: 256
layers: 6

block_config:
  - type: model.SelfAttention
    length_dim: l
    params:
      head_dim: 64
      use_qk_norm: true
  - type: lact_ttt_cam.CamFastWeightGluMLPMultihead
    length_dim: vl
    params:
      head_dim: 256
      inter_multi: 3
      base_lr: 0.01
      muon_update_steps: 5
      cam_mode: mlp2
  - type: model.MLP
    length_dim: vl
    params:
      inter_multi: 4
